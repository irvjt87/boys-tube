<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Video Portal</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 10px; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.05); }
        .video-thumb { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="player-container">
        <iframe id="video-player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>
    
    <h2>Approved Videos</h2>
    <div id="video-list" class="video-grid"></div>

    <script src="app.js"></script>
</body>
</html>
