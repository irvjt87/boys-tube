<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BoysTube</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BoysTube">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            padding: 10px;
            padding-top: calc(env(safe-area-inset-top) + 10px); 
        }

        #player-container { 
            display: none; 
            position: relative; 
            width: 100%;
            aspect-ratio: 16/9; 
            background: #000; 
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* NEW: The Pseudo-Fullscreen State */
        #player-container.active {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            border-radius: 0;
            margin: 0;
            aspect-ratio: auto; /* Kill 16/9 to fill screen */
        }

        /* NEW: The Back Button Overlay Style */
        .back-btn-overlay {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 10px);
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #3498db;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Controlled by app.js */
            border: 1px solid #333;
        }

        .header-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; 
            z-index: 10;
            background: transparent;
        }
    
        .corner-shield {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 80px; 
            height: 50px; 
            z-index: 10;
            background: transparent;
            cursor: default;
        }

        #video-player {
            width: 100%;
            height: 100%;
        }

        h2 { font-size: 1.2rem; margin-left: 5px; color: #ccc; }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding-bottom: 50px; 
        }

        .video-card { 
            cursor: pointer; 
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s; 
        }

        .video-card:active { transform: scale(0.95); }

        .video-thumb { 
            width: 100%; 
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .video-title {
            font-size: 13px;
            padding: 8px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <div class="header-shield"></div>
        <div class="corner-shield"></div>
        <div id="video-player"></div>
    </div>

    <div id="back-btn" class="back-btn-overlay" onclick="showHome()">← Back</div>

    <h2>Pick a Channel</h2>
    <div id="video-list" class="video-grid"></div>

    <script src="app.js"></script>
</body>
</html>
